<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drag & Drop Upload + File Manager</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #dropzone { 
      border: 4px dashed #ccc; 
      padding: 40px; 
      text-align: center; 
      font-size: 20px; 
      margin-bottom: 20px;
      cursor: pointer;
    }
    #dropzone.dragover { border-color: #4CAF50; background: #f0fff0; }
    .file-list { max-height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; }
    .file-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; align-items: center; }
    .file-item:hover { background: #f9f9f9; }
    button { padding: 10px 16px; margin: 5px; }
    .delete-btn { background: #d32f2f; color: white; }
    #status { margin-top: 15px; }
  </style>
</head>
<body>
  <h2>Drag & Drop Upload (No Login Required)</h2>
  <div id="dropzone">Drop files here or click to select</div>
  <input type="file" id="fileInput" multiple style="display:none">

  <div>
    <button onclick="refreshFileList()">🔄 Refresh List</button>
    <button onclick="deleteSelected()" class="delete-btn">🗑️ Delete Selected</button>
  </div>

  <h3>Uploaded Files</h3>
  <div id="fileList" class="file-list"></div>

  <div id="status"></div>

  <script src="config.js"></script>
  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const fileListDiv = document.getElementById('fileList');
    const status = document.getElementById('status');

    let selectedFiles = new Set();
    const sasUrl = (window.UPLOAD_APP_CONFIG?.sasUrl || '').trim();
    let configError = '';
    let sas = null;

    try {
      if (!sasUrl) {
        throw new Error('Missing configuration for UPLOAD_SAS_URL.');
      }
      sas = new URL(sasUrl);
    } catch (err) {
      const detail = err instanceof Error ? err.message : String(err);
      configError = `Configuration error: ${detail}`;
    }

    function ensureConfigured() {
      if (!configError) {
        return true;
      }

      const safe = escapeHtml(configError);
      status.innerHTML = `<p style='color:red'>${safe}</p>`;
      fileListDiv.innerHTML = `
        <p style='color:red'>App is not configured.</p>
        <p style='font-size: 0.9em;'>Provide a valid SAS URL via environment variable <strong>UPLOAD_SAS_URL</strong> and refresh.</p>`;
      return false;
    }

    function getBlobUrl(blobName) {
      return `${sas.origin}${sas.pathname}/${encodeURIComponent(blobName)}${sas.search}`;
    }

    function getListUrl() {
      const url = new URL(sasUrl);
      url.searchParams.set('restype', 'container');
      url.searchParams.set('comp', 'list');
      return url.toString();
    }

    function escapeHtml(value) {
      return value
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    // Drag & Drop handlers
    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => uploadFiles(e.target.files));

    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      uploadFiles(e.dataTransfer.files);
    });

    // Upload files
    async function uploadFiles(files) {
      if (!ensureConfigured()) return;

      for (let file of files) {
        const url = getBlobUrl(file.name);
        const xhr = new XMLHttpRequest();
        xhr.open('PUT', url);
        xhr.setRequestHeader('x-ms-blob-type', 'BlockBlob');
        xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            status.innerHTML += `<p>✅ ${file.name} uploaded</p>`;
            refreshFileList();
          } else {
            status.innerHTML += `<p>❌ Failed: ${file.name} (HTTP ${xhr.status})</p>`;
          }
        };
        xhr.onerror = () => status.innerHTML += `<p>❌ Failed: ${file.name}</p>`;
        xhr.send(file);
      }
    }

    // Fetch and display file list
    async function refreshFileList() {
      if (!ensureConfigured()) return;

      fileListDiv.innerHTML = "Loading files...";
      try {
        const listUrl = getListUrl();
        const response = await fetch(listUrl);
        const text = await response.text();

        if (!response.ok) {
          const parser = new DOMParser();
          const xml = parser.parseFromString(text, "text/xml");
          const code = xml.getElementsByTagName("Code")[0]?.textContent;
          const message = xml.getElementsByTagName("Message")[0]?.textContent;
          throw new Error(`HTTP ${response.status}${code ? ` ${code}` : ''}${message ? `: ${message}` : ''}`);
        }
        
        const parser = new DOMParser();
        const xml = parser.parseFromString(text, "text/xml");
        const blobs = xml.getElementsByTagName("Blob");

        let html = '';
        selectedFiles.clear();

        for (let blob of blobs) {
          const name = blob.getElementsByTagName("Name")[0].textContent;
          html += `
            <div class="file-item">
              <input type="checkbox" onchange="toggleSelect('${name}', this.checked)">
              <span style="flex:1; margin-left:10px;">${name}</span>
            </div>`;
        }

        fileListDiv.innerHTML = html || "<p>No files found.</p>";
      } catch (err) {
        const detail = err instanceof Error ? err.message : String(err);
        fileListDiv.innerHTML = `
          <p style='color:red'>Error loading files.</p>
          <p style='color:#b71c1c; font-size: 0.9em;'>${escapeHtml(detail)}</p>
          <p style='font-size: 0.9em;'>Check SAS token validity (start/end time), required permission <strong>l</strong> for list, and Storage CORS settings for your site origin.</p>`;
      }
    }

    function toggleSelect(name, checked) {
      if (checked) selectedFiles.add(name);
      else selectedFiles.delete(name);
    }

    // Delete selected files
    async function deleteSelected() {
      if (!ensureConfigured()) return;

      if (selectedFiles.size === 0) {
        alert("No files selected");
        return;
      }

      if (!confirm(`Delete ${selectedFiles.size} file(s)?`)) return;

      for (let name of selectedFiles) {
        const url = getBlobUrl(name);
        try {
          const response = await fetch(url, { method: 'DELETE' });
          if (!response.ok) {
            status.innerHTML += `<p>❌ Failed to delete ${name} (HTTP ${response.status})</p>`;
          }
        } catch (e) {}
      }

      status.innerHTML += `<p>🗑️ Deleted ${selectedFiles.size} file(s)</p>`;
      selectedFiles.clear();
      refreshFileList();
    }

    // Initial load
    if (ensureConfigured()) {
      refreshFileList();
    }
  </script>
</body>
</html>
